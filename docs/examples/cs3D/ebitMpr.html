      const moveCursor = `
          <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 30 30">
            <image href="data:image/svg+xml;base64,${moveCursorBase64SVG}" width="30" height="30" style="filter: invert(100%);"/>

        mousePoint: { x: 0, y: 0 },
        mousePointerGroupString: ``,
        viewBox: {
          x: 0,
          y: 0

      });

        "CustomCobbAngle",
        larvitar._CustomCobbAngleTool,
        "3D",
        cursor,
        cursorOptions
      );

      viewportInputs.forEach(vps => {
        larvitar.store.addViewport(vps.viewportId);
      });

      async function createFile(fileName, cb) {
        let response = await fetch("../demo/3d/" + fileName);
        let data = await response.blob();
        let file = new File([data], fileName);
        demoFiles.push(file);
        counter++;
        if (counter == 32) {
          cb();
        }
      }

      const Enums = larvitar._cornerstoneTools.Enums;
      const BlendModes = larvitar._cornerstone.Enums.BlendModes;
      console.log("blend modes", BlendModes);

      const toolsMpr = [
        {
          name: "Crosshairs",
          configuration: {
            getReferenceLineColor: vpId => {
              switch (vpId) {
                case "axial":
                  return "rgb(255,0,0)";
                case "sagittal":
                  return "rgb(0,255,0)";
                case "coronal":
                  return "rgb(255,255,0)";
              }
            },
            // getReferenceLineSlabThicknessControlsOn: () => false,
            shadow: true,
            viewportIndicators: true,
            viewportIndicatorsConfig: {
              radius: 5,
              x: null,
              y: null
            },
            autoPan: {
              enabled: true,
              panSize: 10
            },
            handleRadius: 5,
            enableHDPIHandles: false,
            referenceLinesCenterGapRadius: 20,
            filterActorUIDsToSetSlabThickness: []
            // slabThicknessBlendMode: Enums.BlendModes.MAXIMUM_INTENSITY_BLEND,
          },
          options: {
            bindings: [{ mouseButton: Enums.MouseBindings.Primary }]
          }
        },
        {
          name: "StackScroll",
          options: {
            bindings: [{ mouseButton: Enums.MouseBindings.Wheel }]
          }
        },
        {
          name: "WindowLevel",
          configuration: {},
          options: {
            bindings: [{ mouseButton: Enums.MouseBindings.Primary }]
          }
        },
        {
          name: "Zoom",
          configuration: {},
          options: {
            bindings: [{ mouseButton: Enums.MouseBindings.Secondary }]
          }
        }
      ];

      //     bindings: [
      //       { mouseButton: Enums.MouseBindings.Wheel }, // scroll on wheel

      const toolsMain = [
        {
          name: "CustomCobbAngle",
          configuration: {},
          options: {
            bindings: [{ mouseButton: Enums.MouseBindings.Primary }]
          }
        }
      ];

      async function renderSerie() {
        larvitar
          ._readFiles(demoFiles) // need to port the updateLoadedStack function
          .then(async seriesStack => {
            const seriesId = _.keys(seriesStack)[0];
            const serie = seriesStack[seriesId];

            larvitar._renderMpr(serie, viewportInputs).then(renderingEngine => {
              console.log("Volume rendered", renderingEngine);

              // create MPR tools group
              const toolGroupMpr = larvitar._createToolGroup(
                "mprTools",
                ["axial", "coronal", "sagittal"],
                toolsMpr,
                "MPR"
              );
              const toolGroupMain = larvitar._createToolGroup(
                "mainTools",
                ["main"],
                toolsMain,
                "3D"
              );

              // set tool active on the two groups
              larvitar._setToolActive(
                toolsMpr[0].name,
                toolsMpr[0].options,
                toolGroupMpr.id
              );
              larvitar._setToolActive(
                toolsMain[0].name,
                toolsMain[0].options,
                toolGroupMain.id
              );

              // sync mpr view with axial view
              const syncId = "uniqueSyncId"; // unique id for the sync
              larvitar._syncViewportsCamera(syncId, "main", "axial");

              let slabThickness = 0;

              // switch to interact
              document.addEventListener("keydown", e => {
                switch (e.key) {
                  case "z":
                    larvitar._setToolPassive(toolsMpr[0].name);
                    larvitar._setToolActive(
                      toolsMpr[2].name,
                      toolsMpr[2].options
                    );
                    break;
                  case "x":
                    larvitar._setToolPassive(toolsMpr[2].name);
                    larvitar._setToolActive(
                      toolsMpr[0].name,
                      toolsMpr[0].options
                    );
                  case "a":
                    larvitar._syncViewportsCamera(syncId, "main", "axial");
                    break;
                  case "s":
                    larvitar._syncViewportsCamera(syncId, "main", "sagittal");
                    break;
                  case "c":
                    larvitar._syncViewportsCamera(syncId, "main", "coronal");
                    break;
                  case "1":
                    larvitar._setSlab(
                      slabThickness++,
                      BlendModes.COMPOSITE,
                      "main"
                    );
                    break;
                  case "2":
                    larvitar._setSlab(
                      slabThickness--,
                      BlendModes.COMPOSITE,
                      "main"
                    );
                    break;
                  case "3":
                    larvitar._setSlab(
                      slabThickness++,
                      BlendModes.MAXIMUM_INTENSITY_BLEND,
                      "main"
                    );
                    break;
                  case "4":
                    larvitar._setSlab(
                      slabThickness--,
                      BlendModes.MAXIMUM_INTENSITY_BLEND,
                      "main"
                    );
                    break;
                  case "5":
                    larvitar._setSlab(
                      slabThickness++,
                      BlendModes.MINIMUM_INTENSITY_BLEND,
                      "main"
                    );
                    break;
                  case "6":
                    larvitar._setSlab(
                      slabThickness--,
                      BlendModes.MINIMUM_INTENSITY_BLEND,
                      "main"
                    );
                    break;
                  case "7":
                    larvitar._setSlab(
                      slabThickness++,
                      BlendModes.AVERAGE_INTENSITY_BLEND,
                      "main"
                    );
                    break;
                  case "8":
                    larvitar._setSlab(
                      slabThickness--,
                      BlendModes.AVERAGE_INTENSITY_BLEND,
                      "main"
                    );
                    break;
                  default:
                    console.log("case not found", e.key);
                }
              });
            });
          })
          .catch(err => console.error(err));
      }

      let demoFileList = getDemoFileNames();
      _.each(demoFileList, function (demoFile) {
        createFile(demoFile, renderSerie);
      });
